name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles dmg
            artifact_name: macos-dmg
          - platform: windows-latest
            args: --bundles nsis,msi
            artifact_name: windows-nsis-msi
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build and publish desktop installer
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run --prefix frontend tauri
          tagName: v__VERSION__
          releaseName: rbujo v__VERSION__
          releaseBody: |
            ## 更新日志

            - 新增菜单栏“检查更新...”，支持手动检查更新。
            - 启动后自动检查新版本；选择“暂不更新”后，同一个版本不再自动弹窗，直到下一次更新。
            - 更新弹窗现在显示当前版本、最新版本和 Markdown 更新日志。
            - 修复 Windows 构建缺少 Tauri 图标资源导致安装包生成失败的问题。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Upload desktop installers as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rbujo-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.tar.gz
            src-tauri/target/release/bundle/macos/*.sig
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/msi/*
            src-tauri/target/release/bundle/**/*.json
          if-no-files-found: warn

      - name: Verify expected bundle artifacts
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*setup.exe" -ErrorAction SilentlyContinue
            $msi = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue
            if (-not $nsis -or -not $msi) {
              Write-Error "Missing Windows installer artifacts."
              exit 1
            }
          } else {
            $dmg = Get-ChildItem "src-tauri/target/release/bundle/dmg" -Filter "*.dmg" -ErrorAction SilentlyContinue
            if (-not $dmg) {
              Write-Error "Missing macOS DMG artifact."
              exit 1
            }
          }
