name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles app,dmg
            artifact_name: macos-dmg
          - platform: windows-latest
            args: --bundles nsis,msi
            artifact_name: windows-nsis-msi
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build and publish desktop installer
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run --prefix frontend tauri
          tagName: v__VERSION__
          releaseName: rbujo v__VERSION__
          releaseBody: |
            ## 更新日志

            - 修复 Tauri 2 capability 缺失导致的原生菜单失效问题。
            - 修复检查更新缺少 updater 权限和 release 元数据导致的失败提示。
            - 修复 release workflow 的 updater JSON 上传参数，确保 `latest.json` 会发布到 GitHub Release。
            - 显式生成 updater artifacts，保证 0.1.x 客户端可以检测到 0.2.0 更新。
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          retryAttempts: 2
          args: ${{ matrix.args }}

      - name: Upload desktop installers as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rbujo-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.tar.gz
            src-tauri/target/release/bundle/macos/*.sig
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/msi/*
            src-tauri/target/release/bundle/**/*.json
          if-no-files-found: warn

      - name: Verify expected bundle artifacts
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*setup.exe" -ErrorAction SilentlyContinue
            $msi = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue
            if (-not $nsis -or -not $msi) {
              Write-Error "Missing Windows installer artifacts."
              exit 1
            }
          } else {
            $dmg = Get-ChildItem "src-tauri/target/release/bundle/dmg" -Filter "*.dmg" -ErrorAction SilentlyContinue
            $updater = Get-ChildItem "src-tauri/target/release/bundle/macos" -Filter "*.tar.gz" -ErrorAction SilentlyContinue
            $signature = Get-ChildItem "src-tauri/target/release/bundle/macos" -Filter "*.sig" -ErrorAction SilentlyContinue
            if (-not $dmg) {
              Write-Error "Missing macOS DMG artifact."
              exit 1
            }
            if (-not $updater -or -not $signature) {
              Write-Error "Missing macOS updater artifacts."
              exit 1
            }
          }
